---
- name: Despliegue Controlado de Nginx en Nodo Único (Baseline SPOF)
  hosts: 10.4.8.11  # Seleccionamos explícitamente a cluster1
  become: yes

  tasks:
    - name: Instalar servidor web Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Crear página web de prueba con identificador de nodo
      copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Laboratorio DDoS - Nodo Víctima</title>
              <style>
                  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
                  .node-id { color: #d9534f; font-size: 24px; font-weight: bold; }
              </style>
          </head>
          <body>
              <h1>Servidor Web Activo - Entorno de Laboratorio</h1>
              <p>El nodo que está procesando tu petición es:</p>
              <p class="node-id">{{ inventory_hostname }}</p>
          </body>
          </html>

    - name: Asegurar que el servicio Nginx está iniciado y habilitado
      systemd:
        name: nginx
        state: started
        enabled: yes